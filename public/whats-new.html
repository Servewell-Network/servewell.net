<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>What's New | ServeWell.Net</title>
		<meta name="description" content="Recent changes to ServeWell.Net" />
		<style>
			body {
				margin: 2.25rem;
				font-family: sans-serif;
				font-size: large;
			}
			main {
				max-width: 56rem;
			}
			a {
				color: #0b57d0;
				text-underline-offset: 0.12em;
			}
			a:visited { color: #6a3dad; }
			a:hover { opacity: 0.88; }
			[data-theme="dark"] a { color: #8ec5ff; }
			[data-theme="dark"] a:visited { color: #c4a8ff; }
			.wn-version {
				margin-bottom: 2.5rem;
			}
			.wn-version h2 {
				font-size: 1.4rem;
				margin-bottom: 0.75rem;
				border-bottom: 1px solid var(--border, #d9d9de);
				padding-bottom: 0.35rem;
			}
			.wn-date {
				font-size: 0.95rem;
				font-weight: normal;
				color: var(--muted, #475467);
				margin-left: 0.5rem;
			}
			.wn-group h3 {
				font-size: 1rem;
				text-transform: uppercase;
				letter-spacing: 0.04em;
				margin-bottom: 0.4rem;
				color: var(--muted, #475467);
			}
			.wn-group-feat h3 { color: #1a5f1a; }
			[data-theme="dark"] .wn-group-feat h3 { color: #5fb85f; }
			.wn-group-fix h3 { color: #7a4000; }
			[data-theme="dark"] .wn-group-fix h3 { color: #e09050; }
			.wn-group ul {
				margin: 0 0 1rem 1.25rem;
				padding: 0;
			}
			.wn-group li {
				margin-bottom: 0.3rem;
				line-height: 1.5;
			}
			.wn-empty {
				color: var(--muted, #475467);
				font-style: italic;
			}
		</style>
	</head>
	<body>
		<main>
			<h1>What's New</h1>
			<p>Changes from the last 30 days. For everything else, see <a href="/whats-next">What's Next</a>.</p>
<p class="wn-empty">No changes in the last 30 days.</p>
		</main>
		<script src="/js/servewell-app-shell.js"></script>
	</body>
</html>
