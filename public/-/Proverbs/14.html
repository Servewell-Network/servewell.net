<script>
(function () {
  const page = document.querySelector(".chapter-page");
  if (!(page instanceof HTMLElement)) return;
  const literalToggle = page.querySelector('input[data-column-toggle="literal"]');
  const traditionalToggle = page.querySelector('input[data-column-toggle="traditional"]');
  const emptyMessage = page.querySelector("[data-column-empty-message]");
  const prevHeader = document.querySelector(".chapter-nav-header");
  if (!(literalToggle instanceof HTMLInputElement) || !(traditionalToggle instanceof HTMLInputElement) || !(emptyMessage instanceof HTMLElement)) return;

  function readState() {
    const fallback = { literal: false, traditional: true };
    try {
      const raw = localStorage.getItem('servewell-visible-columns');
      if (!raw) return fallback;
      const parsed = JSON.parse(raw);
      if (!parsed || typeof parsed !== "object") return fallback;
      return {
        literal: parsed.literal !== false,
        traditional: parsed.traditional !== false
      };
    } catch (_error) {
      return fallback;
    }
  }

  function saveState(state) {
    try {
      localStorage.setItem('servewell-visible-columns', JSON.stringify(state));
    } catch (_error) {
      // Ignore storage errors (private mode, disabled storage).
    }
  }

  function applyState(state) {
    const showLiteral = !!state.literal;
    const showTraditional = !!state.traditional;
    literalToggle.checked = showLiteral;
    traditionalToggle.checked = showTraditional;
    page.classList.toggle("mode-both", showLiteral && showTraditional);
    page.classList.toggle("mode-literal-only", showLiteral && !showTraditional);
    page.classList.toggle("mode-traditional-only", !showLiteral && showTraditional);
    page.classList.toggle("mode-none", !showLiteral && !showTraditional);
    if (prevHeader instanceof HTMLElement) {
      prevHeader.classList.toggle("mode-both", showLiteral && showTraditional);
      prevHeader.classList.toggle("mode-literal-only", showLiteral && !showTraditional);
      prevHeader.classList.toggle("mode-traditional-only", !showLiteral && showTraditional);
      prevHeader.classList.toggle("mode-none", !showLiteral && !showTraditional);
    }
    emptyMessage.hidden = showLiteral || showTraditional;
  }

  let state = readState();
  applyState(state);

  function updateFromToggles() {
    state = {
      literal: literalToggle.checked,
      traditional: traditionalToggle.checked
    };
    saveState(state);
    applyState(state);
  }

  literalToggle.addEventListener("change", updateFromToggles);
  traditionalToggle.addEventListener("change", updateFromToggles);
  // Sticky header behavior: hide on scroll down, show on scroll up.
  const header = page.querySelector(".snippet-grid-header");
  if (header instanceof HTMLElement) {
    let lastY = window.scrollY;
    let armY = window.scrollY;
    let ticking = false;
    const THRESH = 6;
    const SHOW_ALWAYS_TOP = 96;
    const ARM_DISTANCE = 120;
    let hideShowEnabled = false;
    function enableHideShow() {
      if (hideShowEnabled) return;
      hideShowEnabled = true;
      header.classList.add("is-scroll-aware");
      armY = window.scrollY;
      lastY = window.scrollY;
    }
    window.addEventListener("wheel", enableHideShow, { passive: true, once: true });
    window.addEventListener("touchmove", enableHideShow, { passive: true, once: true });
    function onKeydown(event) {
      const key = event.key;
      if (key === "ArrowUp" || key === "ArrowDown" || key === "PageUp" || key === "PageDown" || key === "Home" || key === "End" || key === " ") {
        enableHideShow();
        window.removeEventListener("keydown", onKeydown, true);
      }
    }
    window.addEventListener("keydown", onKeydown, true);
    window.addEventListener("scroll", function onScroll() {
      if (ticking) return;
      ticking = true;
      requestAnimationFrame(function () {
        const y = window.scrollY;
        if (!hideShowEnabled) {
          header.classList.remove("hidden");
          lastY = y;
          ticking = false;
          return;
        }
        if (Math.abs(y - armY) < ARM_DISTANCE) {
          header.classList.remove("hidden");
          lastY = y;
          ticking = false;
          return;
        }
        if (y <= SHOW_ALWAYS_TOP) {
          header.classList.remove("hidden");
          lastY = y;
          ticking = false;
          return;
        }
        const dy = y - lastY;
        if (Math.abs(dy) > THRESH) {
          if (dy > 0) header.classList.add("hidden");
          else header.classList.remove("hidden");
          lastY = y;
        }
        ticking = false;
      });
    }, { passive: true });
  }
})();
</script>
<script>
(function () {
  const popover = document.getElementById('word-popover-shared');
  const labelMap = {"p":"Version Type","sn":"Snippet","wp":"Word Position","mg":"Morpheme Gloss","sim":"Segment In Morpheme","smc":"Segments In Morpheme","mid":"Instance ID","os":"Original Script","tr":"Transliteration","gc":"Grammar Code","gr":"Grammar","gf":"Grammar Function","lg":"Language","sr":"Strong's Root","rs":"Root Script","rsnd":"Root Sound","rt":"Root Idea","src":"Source","stok":"Source Token","tseg":"Token Segment","sid":"Strong's ID","omid":"Original Morpheme ID","occ":"Occurrences"};
  if (!(popover instanceof HTMLElement)) return;
  const title = popover.querySelector(".word-popover-title");
  const metaList = popover.querySelector("[data-shared-word-meta]");
  const emptyState = popover.querySelector("[data-shared-word-empty]");
  if (!(title instanceof HTMLElement) || !(metaList instanceof HTMLElement) || !(emptyState instanceof HTMLElement)) return;

  function decodePart(value) {
    try {
      return decodeURIComponent(value);
    } catch (_error) {
      return value;
    }
  }

  function parseMetadata(raw) {
    if (!raw) return [];
    return raw
      .split("&")
      .map((pair) => {
        if (!pair) return null;
        const separatorIndex = pair.indexOf("=");
        if (separatorIndex < 0) return null;
        const compactLabel = decodePart(pair.slice(0, separatorIndex));
        const label = labelMap[compactLabel] || compactLabel;
        const value = decodePart(pair.slice(separatorIndex + 1));
        if (!label || !value) return null;
        return { label, value };
      })
      .filter((entry) => entry !== null);
  }

  function renderMetadata(entries) {
    metaList.textContent = "";
    var gcEntry = entries.find(function(e) { return e.label === "Grammar Code"; });
    var grammarCode = gcEntry ? gcEntry.value : null;
    for (const entry of entries) {
      const row = document.createElement("span");
      row.className = "word-meta-row";
      const label = document.createElement("span");
      label.className = "word-meta-label";
      label.textContent = entry.label;
      const value = document.createElement("span");
      value.className = "word-meta-value";
      if (entry.label === "Occurrences") {
        const link = document.createElement("a");
        var fragment = grammarCode ? "#grammar=" + encodeURIComponent(grammarCode) : "";
        link.href = "https://words.servewell.net/" + encodeURIComponent(entry.value) + fragment;
        link.textContent = "See all instances";
        link.className = "word-meta-link";
        value.appendChild(link);
      } else {
        value.textContent = entry.value;
      }
      row.append(label, value);
      metaList.appendChild(row);
    }
    emptyState.hidden = entries.length > 0;
  }

  document.addEventListener("click", (event) => {
    const eventTarget = event.target;
    if (!(eventTarget instanceof Element)) return;
    const button = eventTarget.closest("button.word-token[data-m]");
    if (!(button instanceof HTMLButtonElement)) return;

    const displayWord = button.textContent || "";
    title.textContent = displayWord;
    const metadataEntries = parseMetadata(button.dataset.m || "");
    renderMetadata(metadataEntries);
  }, { capture: true });
})();
</script>
<script src="/js/servewell-app-shell.js"></script>
</body>
</html>
